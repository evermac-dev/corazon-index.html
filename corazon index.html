
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

#text {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 50%;
    transform: translateY(-50%);
    color: white;
    font-size: 32px;
    opacity: 0;
    transition: 2s;
    text-shadow: 0 0 20px red;
}

.show {
    opacity: 1 !important;
}
</style>
</head>

<body>

<canvas id="c"></canvas>
<div id="text">Para ti ❤️</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
const count = 250;

function heart(t) {
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: 13 * Math.cos(t)
           - 5 * Math.cos(2 * t)
           - 2 * Math.cos(3 * t)
           - Math.cos(4 * t)
    };
}

// estrellas de fondo
let stars = [];
for (let i = 0; i < 120; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.5
    });
}

// partículas
for (let i = 0; i < count; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        tx: 0,
        ty: 0,
        speed: Math.random() * 0.04 + 0.02
    });
}

let time = 0;

function drawStars() {
    ctx.fillStyle = "white";
    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    });
}

function animate() {
    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawStars();

    let pulse = Math.sin(time) * 2; // latido

    particles.forEach((p, i) => {

        let angle = (i / count) * Math.PI * 2;

        let h = heart(angle);

        let scale = 18 + pulse;

        p.tx = canvas.width / 2 + h.x * scale;
        p.ty = canvas.height / 2 - h.y * scale;

        p.x += (p.tx - p.x) * p.speed;
        p.y += (p.ty - p.y) * p.speed;

        ctx.shadowBlur = 20;
        ctx.shadowColor = "red";
        ctx.fillStyle = "red";

        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
        ctx.fill();
    });

    ctx.shadowBlur = 0;

    time += 0.05;

    requestAnimationFrame(animate);
}

animate();

// mensaje aparece después
setTimeout(() => {
    document.getElementById("text").classList.add("show");
}, 2500);
</script>

</body>
</html>
