<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>❤️</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family:Arial;
}

canvas {
    position: absolute;
    top: 0;
    left: 0;
}

#text {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 50%;
    transform:translateY(-50%);
    color: white;
    font-size: 32px;
    opacity: 0;
    transition: 2s;
    text-shadow: 0 0 20px red;

}

.show {
    opacity: 1!important;
}

#hint {
    position: absolute;
    width: 100%;
    bottom: 30px;
    text-align: center;
    color: #aaa;
    font-size: 14px;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="text"> I want to know you<br>Laci 💚 </div>
<div id="hint">✨</div>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
const count = 200;

function heart(t) {
    return {
        x: 16 * Math.pow(Math.sin(t), 3),
        y: 13 * Math.cos(t)
           - 5 * Math.cos(2*t)
           - 2 * Math.cos(3*t)
           - Math.cos(4*t)
    };
}

for (let i = 0; i < count; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        tx: 0,
        ty: 0,
        speed: Math.random() * 0.04 + 0.02
    });
}

let time = 0;

function animate() {

    ctx.fillStyle = "rgba(0,0,0,0.25)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    let pulse = Math.sin(time) * 2;

    particles.forEach((p, i) => {

        let angle = (i / count) * Math.PI * 2;

        let h = heart(angle);

        let scale = 18 + pulse;

        p.tx = canvas.width / 2 + h.x * scale;
        p.ty = canvas.height / 2 - h.y * scale;

        p.x += (p.tx - p.x) * 0.05;
        p.y += (p.ty - p.y) * 0.05;

        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
    });

    time += 0.03;

    requestAnimationFrame(animate);
}

animate();

// mensaje
setTimeout(() => {
    document.getElementById("text").classList.add("show");
}, 2500);

// interacción (solo visual)
window.addEventListener("pointerdown", () => {
    document.getElementById("hint").style.display = "none";
});

</script>

</body>
</html>
